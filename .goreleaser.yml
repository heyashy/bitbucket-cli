version: 2

project_name: bb

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/bb
    binary: bb
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: heyashy
      name: homebrew-tap
    homepage: "https://github.com/heyashy/bitbucket-cli"
    description: "Bitbucket CLI — git proxy with Bitbucket superpowers"
    license: "MIT"
    install: |
      bin.install "bb"
    test: |
      system "#{bin}/bb", "--version"
